<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FifaStream</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
    }
    .container {
      width: min(100%, 1200px);
      padding: 1.5rem;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.3);
    }
    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .title-group {
      text-align: left;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }
    .button-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 0.85rem 1.25rem;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
      background: rgba(56, 189, 248, 0.17);
      color: #e2e8f0;
    }
    button.active,
    button:hover {
      background: #38bdf8;
      color: #0f172a;
      transform: translateY(-1px);
    }
    .iframe-panel {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 420px;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .note {
      margin-top: 1rem;
      color: #cbd5e1;
      line-height: 1.6;
      text-align: left;
    }
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .title-group {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="iframe-panel">
      <iframe
        id="fusballIframe"
        src="https://junkieembeds.pages.dev/embed/fusballtv1uhd-de"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen; resolution-change"
        allowfullscreen
        referrerpolicy="origin"
      ></iframe>
    </div>
     <p class="note">If a stream does not show, try refreshing the page or selecting the other source.</p>
  </div>
</body>
</html>
